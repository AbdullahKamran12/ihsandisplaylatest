<!DOCTYPE html>
<html>
<head>
  <base href="/ihsandisplaylatest/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Mosque prayer times display screen.">

  <!-- PWA fullscreen on mobile -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ihsan Display">

  <!-- Force landscape on mobile browsers -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Ihsan Display</title>
  <link rel="manifest" href="manifest.json">

  <!-- Screen wake lock — keeps display on when running as PWA -->
  <script>
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (e) {
        console.warn('Wake lock request failed:', e);
      }
    }
    // Re-acquire wake lock if the tab becomes visible again
    // (browser releases it automatically when tab is hidden)
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible') {
        await requestWakeLock();
      }
    });
    window.addEventListener('load', requestWakeLock);
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
